<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PREVENCION - Registro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#e0e0e0;font-family:'Share Tech Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center}
header{width:100%;background:#000;border-bottom:2px solid #FFD700;padding:16px 32px;display:flex;align-items:center;gap:16px}
.badge{background:#000;border:3px solid #FFD700;padding:6px 18px;font-family:'Rajdhani',sans-serif;font-size:1.5rem;font-weight:700;color:#FFD700;letter-spacing:3px}
header p{font-size:.75rem;color:#666;letter-spacing:2px;text-transform:uppercase}
main{width:100%;max-width:960px;padding:32px 16px;display:flex;flex-direction:column;align-items:center;gap:20px}
#drop-zone{width:100%;border:2px dashed #2a2a2a;border-radius:4px;padding:56px 24px;text-align:center;cursor:pointer;background:#111;position:relative;transition:border-color .2s,background .2s}
#drop-zone:hover,#drop-zone.over{border-color:#FFD700;background:#161616}
#drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
#drop-zone .ic{font-size:2.8rem;display:block;margin-bottom:12px}
#drop-zone h2{font-family:'Rajdhani',sans-serif;font-size:1.4rem;color:#FFD700;letter-spacing:2px}
#drop-zone small{color:#555;font-size:.8rem;margin-top:6px;display:block}
#status{width:100%;background:#111;border-left:3px solid #FFD700;padding:12px 16px;font-size:.78rem;color:#aaa;display:none;line-height:1.7}
#status.on{display:block}
#status span{color:#FFD700}
#wrap{width:100%;display:none;flex-direction:column;align-items:center;gap:16px}
#wrap.on{display:flex}
canvas{display:block;width:100%;max-width:900px;height:auto;border:1px solid #222}
.btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
button{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1rem;letter-spacing:2px;padding:12px 28px;border:none;cursor:pointer;border-radius:2px}
.dl{background:#FFD700;color:#000}
.dl:hover{background:#ffe033}
.rst{background:transparent;color:#FFD700;border:1px solid #FFD700}
.rst:hover{background:rgba(255,215,0,.08)}
#live{display:none;align-items:center;gap:8px;font-size:.78rem;color:#666}
#live.on{display:flex}
.dot{width:8px;height:8px;border-radius:50%;background:#4CAF50;animation:blink 1.2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
footer{margin-top:auto;padding:20px;font-size:.65rem;color:#2a2a2a;letter-spacing:1px}
</style>
</head>
<body>
<header>
  <div class="badge">PREVENCION</div>
  <p>Sistema de Registro Fotografico con Geolocalizacion</p>
</header>
<main>
  <div id="drop-zone">
    <input type="file" id="fi" accept="image/*">
    <span class="ic">&#128247;</span>
    <h2>SUBIR FOTOGRAFIA</h2>
    <small>Clic aqui o arrastra una imagen</small>
  </div>
  <div id="status"></div>
  <div id="live"><div class="dot"></div><span id="clk"></span></div>
  <div id="wrap">
    <canvas id="c"></canvas>
    <div class="btns">
      <button class="dl" onclick="dl()">&#11015; DESCARGAR</button>
      <button class="rst" onclick="reset()">&#8617; NUEVA FOTO</button>
    </div>
  </div>
</main>
<footer>PREVENCION 2026 &mdash; Registro con Marca de Tiempo y Geolocalizacion</footer>

// Estructura de direccion: 4 lineas exactas como la referencia
// linea1: numero + calle  (ej: "5193 Avenida Javier Prado Este")
// linea2: urbanizacion/barrio  (ej: "Camacho")
// linea3: distrito  (ej: "La Molina")
// linea4: "Provincia de " + ciudad  (ej: "Provincia de Lima")

dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('over');});
dz.addEventListener('dragleave',function(){dz.classList.remove('over');});
dz.addEventListener('drop',function(e){
  e.preventDefault();dz.classList.remove('over');
  var f=e.dataTransfer.files[0];
  if(f&&f.type.startsWith('image/'))load(f);
});
fi.addEventListener('change',function(e){if(e.target.files[0])load(e.target.files[0]);});

function load(f){
  var r=new FileReader();
  r.onload=function(ev){
    var i=new Image();
    i.onload=function(){
      img=i;C.width=i.width;C.height=i.height;
      dz.style.display='none';
      wrap.classList.add('on');live.classList.add('on');
      getLoc();startRender();
    };
    i.src=ev.target.result;
  };
  r.readAsDataURL(f);
}

function getLoc(){
  st.className='on';
  st.innerHTML='Obteniendo ubicacion GPS...';
  if(!navigator.geolocation){
    loc={l1:'',l2:'',l3:'',l4:''};
    st.innerHTML='GPS no disponible en este navegador.';return;
  }
  navigator.geolocation.getCurrentPosition(function(pos){
    var lat=pos.coords.latitude,lon=pos.coords.longitude;
    st.innerHTML='GPS: <span>'+lat.toFixed(6)+', '+lon.toFixed(6)+'</span> &mdash; Obteniendo direccion...';
    fetch('https://nominatim.openstreetmap.org/reverse?lat='+lat+'&lon='+lon+'&format=json&addressdetails=1&accept-language=es')
    .then(function(r){return r.json();})
    .then(function(d){
      var a=d.address||{};

      // LINEA 1: numero + calle
      var calle='';
      if(a.road){
        calle=(a.house_number?a.house_number+' ':'')+a.road;
      } else if(a.pedestrian){
        calle=(a.house_number?a.house_number+' ':'')+a.pedestrian;
      } else if(a.address29||a.address100){
        calle=a.address29||a.address100;
      }

      // LINEA 2: urbanizacion / barrio / colonia
      var barrio=a.suburb||a.neighbourhood||a.quarter||a.village_district||a.hamlet||'';

      // LINEA 3: distrito / municipio
      var distrito=a.city_district||a.district||a.municipality||a.county||'';

      // LINEA 4: "Provincia de X"
      var ciudad=a.city||a.town||a.village||a.state_district||'';
      var provincia=ciudad?'Provincia de '+ciudad:'';

      loc={l1:calle,l2:barrio,l3:distrito,l4:provincia};

      var resumen=[calle,barrio,distrito,provincia].filter(function(x){return x;}).join(' - ');
      st.innerHTML='<span>'+resumen+'</span>';
    }).catch(function(err){
      loc={l1:'Lat: '+lat.toFixed(6),l2:'Lon: '+lon.toFixed(6),l3:'',l4:''};
      st.innerHTML='Coordenadas: <span>'+lat.toFixed(6)+', '+lon.toFixed(6)+'</span>';
    });
  },function(err){
    var msgs={1:'Permiso de ubicacion denegado',2:'Posicion no disponible',3:'Tiempo agotado'};
    loc={l1:msgs[err.code]||'Error de GPS',l2:'',l3:'',l4:''};
    st.innerHTML='GPS no disponible &mdash; '+(msgs[err.code]||'Error desconocido');
  },{enableHighAccuracy:true,timeout:15000,maximumAge:0});
}

function startRender(){
  if(raf)cancelAnimationFrame(raf);
  function loop(){draw();raf=requestAnimationFrame(loop);}
  loop();
}

function getTs(){
  var n=new Date();
  var d=String(n.getDate()).padStart(2,'0');
  var ms=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  var y=n.getFullYear();
  var h=String(n.getHours()).padStart(2,'0');
  var m=String(n.getMinutes()).padStart(2,'0');
  var s=String(n.getSeconds()).padStart(2,'0');
  var ts=d+' '+ms[n.getMonth()]+' '+y+' '+h+':'+m+':'+s;
  clk.textContent=ts;
  return ts;
}

function draw(){
  if(!img)return;
  ctx.drawImage(img,0,0);
  var W=C.width,H=C.height;

  // Escala proporcional igual que la referencia (~1270px de ancho)
  var sc=W/1270;
  var fs=Math.round(34*sc);   // tamanio de fuente
  var lh=Math.round(fs*1.48); // interlineado
  var px=Math.round(20*sc);   // padding izquierdo
  var py=Math.round(18*sc);   // padding inferior

  // Armar las 5 lineas exactas del formato
  var ts=getTs();
  var lines=[ts];
  if(loc){
    if(loc.l1)lines.push(loc.l1);
    if(loc.l2)lines.push(loc.l2);
    if(loc.l3)lines.push(loc.l3);
    if(loc.l4)lines.push(loc.l4);
  }

  // Gradiente de oscurecimiento en la zona del texto (inferior izquierda)
  var blockH=lines.length*lh+py*2;
  var grd=ctx.createLinearGradient(0,H-blockH-lh,0,H);
  grd.addColorStop(0,'rgba(0,0,0,0)');
  grd.addColorStop(0.5,'rgba(0,0,0,0.35)');
  grd.addColorStop(1,'rgba(0,0,0,0.6)');
  ctx.fillStyle=grd;
  ctx.fillRect(0,H-blockH-lh,W*0.8,blockH+lh);

  // Texto blanco bold (mismo estilo que la referencia)
  ctx.font='bold '+fs+'px \'Trebuchet MS\',\'Arial\',sans-serif';
  ctx.fillStyle='#ffffff';
  ctx.shadowColor='rgba(0,0,0,1)';
  ctx.shadowBlur=Math.round(6*sc);
  ctx.shadowOffsetX=Math.round(2*sc);
  ctx.shadowOffsetY=Math.round(2*sc);

  for(var i=0;i<lines.length;i++){
    var y=H-py-(lines.length-1-i)*lh;
    ctx.fillText(lines[i],px,y);
  }

  ctx.shadowBlur=0;ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;

  // Logo PREVENCION - esquina superior derecha
  if(logo.complete&&logo.naturalWidth>0){
    // El parche mide aprox 4:1 de ancho-alto
    var lw=Math.round(W*0.25);
    var lh2=Math.round(lw*(logo.naturalHeight/logo.naturalWidth));
    var mr=Math.round(14*sc);
    var mt=Math.round(14*sc);
    ctx.drawImage(logo,W-lw-mr,mt,lw,lh2);
  }
}

function dl(){
  if(raf)cancelAnimationFrame(raf);
  draw();
  var a=document.createElement('a');
  var n=new Date();
  var st2=n.getFullYear()+pad2(n.getMonth()+1)+pad2(n.getDate())+'_'+pad2(n.getHours())+pad2(n.getMinutes())+pad2(n.getSeconds());
  a.download='PREVENCION_'+st2+'.jpg';
  a.href=C.toDataURL('image/jpeg',0.96);
  a.click();
  startRender();
}

function pad2(x){return String(x).padStart(2,'0');}

function reset(){
  if(raf)cancelAnimationFrame(raf);
  img=null;loc=null;fi.value='';
  wrap.classList.remove('on');live.classList.remove('on');
  st.className='';dz.style.display='';
}
</script>
</body>
